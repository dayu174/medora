<script>
        // Simple toggle interaction logic for demonstration
        document.querySelectorAll('button[aria-pressed]').forEach(button => {
            button.addEventListener('click', function() {
                const isPressed = this.getAttribute('aria-pressed') === 'true';
                this.setAttribute('aria-pressed', !isPressed);
                
                const indicator = this.querySelector('div');
                if (!isPressed) {
                    this.classList.replace('bg-surface-container-high', 'bg-primary');
                    indicator.classList.replace('bg-outline', 'bg-on-primary');
                    indicator.classList.replace('translate-x-0', 'translate-x-6');
                } else {
                    this.classList.replace('bg-primary', 'bg-surface-container-high');
                    indicator.classList.replace('bg-on-primary', 'bg-outline');
                    indicator.classList.replace('translate-x-6', 'translate-x-0');
                }
            });
        });
    </script>
